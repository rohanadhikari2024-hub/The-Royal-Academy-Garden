<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Academy | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background-color: #000; overflow: hidden; font-family: 'Inter', sans-serif; }

        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; padding: 25px 5vw;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            background: rgba(0, 0, 0, 0.15); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-brand { font-family: 'Times New Roman', Times, serif; font-size: 1.4rem; color: #fff; text-decoration: none; letter-spacing: 1px; }
        .nav-links { display: flex; list-style: none; gap: 35px; }
        .nav-links a { text-decoration: none; color: rgba(255, 255, 255, 0.7); font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        .dropdown { position: relative; }
        .dropdown-content {
            position: absolute; top: 100%; left: 0; min-width: 180px;
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px 0; display: none; border-radius: 4px;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { display: block; padding: 12px 20px; color: rgba(255, 255, 255, 0.8); font-size: 0.7rem; text-decoration: none; }
        .dropdown-content a:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }

        .hero { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hero-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(0.6); }
        .hero-text { position: relative; z-index: 10; font-family: 'Times New Roman', Times, serif; font-size: clamp(2.5rem, 10vw, 7rem); font-weight: 400; font-style: italic; color: #FFFFFF; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="nav-brand">Home</a>
        <ul class="nav-links">
            <li><a href="history.html">History</a></li>
            <li class="dropdown">
                <a href="#">Greenhouses ▾</a>
                <div class="dropdown-content">
                    <a href="greenhouse1.html">Greenhouse 1</a>
                    <a href="greenhouse2.html">Greenhouse 2</a>
                </div>
            </li>
            <li><a href="garden.html">Garden</a></li>
            <li><a href="mushroom_center.html">Mushroom Center</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About Us</a></li>
        </ul>
    </nav>

    <main class="hero">
        <img src="https://climapodgreenhouses.com/cdn/shop/articles/Beginners_Guide_to_Small_Hydroponic_Greenhouses.jpg?v=1734705598&width=1100" alt="Hydroponics" class="hero-img">
        <h1 class="hero-text">The Royal Academy</h1>
    </main>
<div id="display-area">Loading data from Hygraph...</div>

<script>
  // 1. Paste your High Performance URL here
  const HYGRAPH_URL = 'https://ap-south-1.cdn.hygraph.com/content/cmnjy6z6u01fh08w8jeen94pn/master';

  async function getMyLiveInfo() {
    const query = {
      query: `{
        projects {
          title
          body {
            text
          }
        }
      }`
    };

    try {
      const response = await fetch(HYGRAPH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(query),
      });

      const result = await response.json();
      const projects = result.data.projects;

      // 2. This part clears the "Loading" text and adds your real data
      const display = document.getElementById('display-area');
      display.innerHTML = projects.map(p => `
        <div style="border-bottom: 1px solid #ccc; padding: 10px;">
          <h2>${p.title}</h2>
          <p>${p.body ? p.body.text : ''}</p>
        </div>
      `).join('');

    } catch (err) {
      console.error("Oops:", err);
      document.getElementById('display-area').innerText = "Error loading info.";
    }
  }

  getMyLiveInfo();
</script>
    
</body>
</html>
